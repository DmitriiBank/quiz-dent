<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <link rel="stylesheet" href="style.css">
    <title>Стоматологический квиз</title>
    <style>
        /* Критические стили для быстрой загрузки */
        html, body {
            touch-action: pan-x pan-y;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
        }
        * {
            -webkit-tap-highlight-color: rgba(0,0,0,0);
        }
    </style>
</head>
<body ontouchstart="">
<div class="quiz-container">
    <h1>DENT - Quiz</h1>
    <div class="progress">
        Вопрос <span id="current-question">1</span> из <span id="total-questions">0</span>
    </div>
    <div id="question-container"></div>
    <div class="navigation">
        <button id="prev-btn">Назад</button>
        <button id="next-btn">Вперед</button>
    </div>
</div>
<div id="results" class="results" style="display: none;"></div>
<button id="restart-btn" style="display: none;">Пройти заново</button>

<script src="script.js"></script>
</body>
</html>
